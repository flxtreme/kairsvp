<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle - warm amber -->
  <circle cx="16" cy="16" r="15.5" fill="#92400e" stroke="#fef3c7" stroke-width="0.8"/>
  
  <!-- Inner circle - cream -->
  <circle cx="16" cy="16" r="13" fill="#fef3c7"/>

  <!-- Safari hat brim -->
  <ellipse cx="16" cy="19.5" rx="10.5" ry="2.8" fill="#c8933a"/>
  
  <!-- Hat crown -->
  <rect x="10" y="11" width="12" height="9" rx="2.5" fill="#d4a44c"/>
  
  <!-- Hat band -->
  <rect x="10" y="17.2" width="12" height="2" rx="0.5" fill="#92400e"/>
  
  <!-- Hat top curve -->
  <ellipse cx="16" cy="11.2" rx="6" ry="1.8" fill="#d4a44c"/>

  <!-- Binoculars body left -->
  <rect x="8.5" y="22" width="5.5" height="4" rx="1.5" fill="#78350f"/>
  <!-- Binoculars body right -->
  <rect x="18" y="22" width="5.5" height="4" rx="1.5" fill="#78350f"/>
  <!-- Binoculars bridge -->
  <rect x="13.5" y="23" width="5" height="2" rx="0.5" fill="#92400e"/>
  <!-- Binoculars lens left -->
  <circle cx="11.2" cy="24" r="1.5" fill="#fef3c7" opacity="0.6"/>
  <!-- Binoculars lens right -->
  <circle cx="20.8" cy="24" r="1.5" fill="#fef3c7" opacity="0.6"/>
</svg>